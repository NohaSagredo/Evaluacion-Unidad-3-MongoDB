<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Usuarios - Evaluación Unidad 3</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- DataTables Bootstrap 5 CSS -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a0933;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        .form-card {
            background: rgba(27, 19, 48, 0.85);
            border: 2px solid #ea39b8;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            overflow: hidden;
            margin-bottom: 50px;
        }
        .form-card-header {
            background-color: rgba(18, 11, 36, 0.95);
            border-bottom: 2px solid #ea39b8;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .browser-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid #475569;
        }
        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #eab308; }
        .dot-green { background-color: #22c55e; }
        .form-card-body {
            padding: 25px 35px;
        }
        .form-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #32fbe2;
            margin: 0;
        }
        .table {
            color: #ffffff !important;
            border-color: rgba(234, 57, 184, 0.2) !important;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255, 255, 255, 0.03) !important;
            color: #ffffff !important;
        }
        .table-light {
            background-color: rgba(18, 11, 36, 0.8) !important;
            color: #32fbe2 !important;
        }

        /* Estilos Cyberpunk para DataTables */
        .dataTables_wrapper .dataTables_filter {
            margin-bottom: 1.5rem;
            color: #32fbe2 !important;
            font-weight: 600;
        }
        .dataTables_wrapper .dataTables_filter input {
            background-color: rgba(26, 9, 51, 0.6) !important;
            color: #ffffff !important;
            border: 1.5px solid rgba(234, 57, 184, 0.4) !important;
            border-radius: 6px !important;
            padding: 6px 12px !important;
            margin-left: 0.5rem !important;
            transition: all 0.2s ease-in-out;
        }
        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: #32fbe2 !important;
            box-shadow: 0 0 12px rgba(50, 251, 226, 0.5) !important;
            outline: none;
        }
        .dataTables_wrapper .dataTables_length {
            color: #32fbe2 !important;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .dataTables_wrapper .dataTables_length select {
            background-color: rgba(26, 9, 51, 0.6) !important;
            color: #ffffff !important;
            border: 1.5px solid rgba(234, 57, 184, 0.4) !important;
            border-radius: 6px !important;
            padding: 4px 24px 4px 10px !important;
            margin: 0 0.5rem !important;
            outline: none;
        }
        .dataTables_wrapper .dataTables_info {
            color: #32fbe2 !important;
            font-size: 0.9rem;
            font-weight: 500;
            padding-top: 1rem;
        }
        .dataTables_wrapper .dataTables_paginate {
            padding-top: 1rem;
        }
        .page-link {
            background-color: rgba(26, 9, 51, 0.6) !important;
            color: #ffffff !important;
            border: 1.5px solid rgba(234, 57, 184, 0.4) !important;
            transition: all 0.2s ease-in-out;
            margin: 0 2px;
            border-radius: 6px !important;
        }
        .page-link:hover {
            background-color: rgba(234, 57, 184, 0.2) !important;
            color: #32fbe2 !important;
            border-color: #32fbe2 !important;
        }
        .page-item.active .page-link {
            background: linear-gradient(135deg, #ea39b8, #7c3aed) !important;
            border-color: transparent !important;
            color: #ffffff !important;
            box-shadow: 0 0 10px rgba(234, 57, 184, 0.5) !important;
        }
        .page-item.disabled .page-link {
            background-color: rgba(26, 9, 51, 0.3) !important;
            color: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(234, 57, 184, 0.1) !important;
        }
        .table-custom-link {
            color: #32fbe2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .table-custom-link:hover {
            color: #ea39b8;
            text-decoration: underline;
        }
        .user-badge-id {
            background-color: rgba(234, 57, 184, 0.15);
            color: #ea39b8;
            border: 1px solid #ea39b8;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .table-loader-container {
            padding: 3rem;
            text-align: center;
        }
        .spinner-custom {
            color: #32fbe2;
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Evaluación Unidad 3</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" id="nav_usuarios" aria-current="page" href="./index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="nav_registro" href="./formulario.html">Registro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Tarjeta de Listado de Usuarios -->
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="form-card">
                    <div class="form-card-header">
                        <div class="browser-dots">
                            <span class="dot dot-red"></span>
                            <span class="dot dot-yellow"></span>
                            <span class="dot dot-green"></span>
                        </div>
                        <h3 class="form-title"><i class="bi bi-people-fill me-2"></i>Usuarios Registrados (JSONPlaceholder)</h3>
                        <div style="width: 50px;"></div>
                    </div>
                    <div class="form-card-body">
                        <!-- Loader animado mientras cargan los datos -->
                        <div id="table-loader" class="table-loader-container">
                            <div class="spinner-border spinner-custom" role="status">
                                <span class="visually-hidden">Cargando datos...</span>
                            </div>
                            <p class="mt-3 text-secondary">Consultando API de JSONPlaceholder...</p>
                        </div>

                        <!-- Tabla de usuarios (inicialmente oculta) -->
                        <div id="table-container" class="table-responsive d-none">
                            <table id="usersTable" class="table table-striped table-hover mb-0 align-middle w-100">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">ID</th>
                                        <th scope="col">Nombre</th>
                                        <th scope="col">Usuario</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Sitio Web</th>
                                        <th scope="col">Ciudad</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Se cargan dinámicamente mediante jQuery -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts necesarios (jQuery, Bootstrap y DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    
    <!-- jQuery DataTables Core -->
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <!-- DataTables Bootstrap 5 Integration -->
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

    <!-- Script de la Tabla -->
    <script src="./js/table.js"></script>
</body>
</html>
